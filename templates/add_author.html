<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
</head>
<style>
     body {
        background-color: #F3E5F5;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        margin: 0;
     }
     body h1 {
        color: #5E35B1;
        margin-top: 30px;
     }
      body form {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #5E35B1;
        background-color: #fff;
        width: 65%;


      }
       input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            box-sizing: border-box;

            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 8px;
            font-size: 16px;
        }
        button,
        input[type="submit"] {
            background-color: #5E35B1;
            color: #FFFFFF;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
    }
    .msg-box {
        padding: 10px;
        border-radius: 10px;
    }
    .msg-success {
        background: #BFE9CF;
        color: #3F7F5E;
    }
    .msg-error {
        background: #FADBD8;
        color: #78281F;
    }
</style>
<body>
    <h1>Add a new Author</h1>
    <form action="/add_author" method="POST">
        <label for="name">Author Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="birth_date">Birthdate:</label>
        <input type="date" id="birth_date" name="birth_date" required><br><br>
        <label for="date_of_death">Date of Death:</label>
        <input type="date" id="date_of_death" name="date_of_death"><br><br>
        <input type="submit" value="Add Author">
    </form>
    {% if message %}
        <p class="msg-box {{ 'msg-error' if error else 'msg-success' }}">
            {{ message }}
        </p>
    {% endif %}
</body>
</html>
