<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
         body {
            background-color: #F3E5F5;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        body h1 {
            color: #5E35B1;
            margin-top: 30px;
        }
        body form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #5E35B1;
            background-color: #fff;
            width: 65%;
      }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            box-sizing: border-box;

            background-color: #FFFFFF;
            border: 1px solid #CCCCCC;
            border-radius: 8px;
            font-size: 16px;
        }
        button,
        input[type="submit"] {
            background-color: #5E35B1;
            color: #FFFFFF;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .home-btn {
            background-color: #FFFFFF;
            color: #5E35B1;
            padding: 10px 20px;
            border: 1px solid #5E35B1;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .msg-box {
            padding: 10px;
            border-radius: 10px;
        }
        .msg-success {
            background: #BFE9CF;
            color: #3F7F5E;
        }
        .msg-error {
            background: #FADBD8;
            color: #78281F;
        }
    </style>
</head>
<body>
    <h1>Add a new Book</h1>
    <form action="/add_book" method="POST">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required><br><br>
        <label for="author">Choose an Author:</label>
        <select name="author" id="author">
            {% for author in authors %}
                <option value="{{ author.id }}">{{ author.name }}</option>
            {% endfor %}
        </select><br><br>
        <label for="isbn">ISBN:</label>
        <input type="text" id="isbn" name="isbn"><br><br>
        <div class="btn-row">
            <input type="submit" value="Add Book">
            <a href="/" class="home-btn">Home</a>
        </div>
    </form>
     {% if message %}
        <p class="msg-box {{ 'msg-error' if error else 'msg-success' }}">
            {{ message }}
        </p>
    {% endif %}
</body>
</html>
