<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        body {
            background-color: #F3E5F5;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        body h1 {
            color: #5E35B1;
            margin-top: 30px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
            padding: 0 20px;
            margin-top: 20px;
        }
        .card {
            border: 1px solid #5E35B1;
            background-color: #fff;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .author {
            color: #848482;
            font-style: italic;
            margin: 0 0 5px;
        }
        .title {
            margin: 0 0 8px 0;
            color: #5E35B1;
        }
    </style>
</head>
<body>
    <h1>Book-Alchemy Library</h1>
    <div class="container">
        {% for book in books %}
            <div class="card">
                <div>
                    <h3 class="title">{{ book.title }}</h3>
                    <p class="author">{{ book.author.name }}</p>
                </div>
               {% if book.isbn %}
                        <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-S.jpg"
                             alt="{{ book.title }} Cover"
                             style="width: 150px; height: 220px; object-fit: cover; border-radius: 8px;">
                    {% else %}
                        <div style="width: 120px; height: 180px; background: #E0D7EC; border-radius: 4px; margin: 0 auto 10px auto; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #5E35B1;">
                            No Cover Available
                        </div>
               {% endif %}
            </div>
        {% endfor %}
    </div>
</body>
</html>
